<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | MockHire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb;
            color: #111827;
        }

        .clean-card {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
    </style>
    <link rel="icon" type="image/png" href="/favicon.ico">
</head>

<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full space-y-8 clean-card p-10 animate-in fade-in zoom-in duration-500">
        <div class="text-center space-y-2">
            <div
                class="w-16 h-16 bg-blue-600 rounded flex items-center justify-center mx-auto mb-6 shadow-sm">
                <i data-lucide="user-plus" class="text-white w-8 h-8"></i>
            </div>
            <h1 class="text-3xl font-bold tracking-tight text-gray-900">Create an Account</h1>
            <p class="text-gray-500 text-sm">Join to practice with our AI recruiter.</p>
        </div>

        {% if error %}
        <div class="bg-red-50 border border-red-200 text-red-600 p-4 rounded-lg text-sm text-center flex items-center justify-center gap-2">
            <i data-lucide="alert-circle" class="w-4 h-4"></i>
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" class="space-y-4 pt-2">
            {% csrf_token %}
            <div class="space-y-1.5">
                <label class="text-sm font-semibold text-gray-700">Username</label>
                <div class="relative">
                    <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 w-4 h-4"></i>
                    <input type="text" name="username" placeholder="Choose a username" required
                        class="w-full bg-white border border-gray-300 rounded-lg p-3 pl-11 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all text-sm text-gray-900 shadow-sm">
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="text-sm font-semibold text-gray-700">Email Address</label>
                <div class="relative">
                    <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 w-4 h-4"></i>
                    <input type="email" name="email" placeholder="you@example.com" required
                        class="w-full bg-white border border-gray-300 rounded-lg p-3 pl-11 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all text-sm text-gray-900 shadow-sm">
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="text-sm font-semibold text-gray-700">Password</label>
                <div class="relative">
                    <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 w-4 h-4"></i>
                    <input type="password" name="password" placeholder="••••••••" required
                        class="w-full bg-white border border-gray-300 rounded-lg p-3 pl-11 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all text-sm text-gray-900 shadow-sm">
                </div>
            </div>

            <button type="submit"
                class="w-full py-3 mt-6 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 transition-colors flex items-center justify-center gap-2 shadow-sm">
                Sign Up
            </button>
        </form>

        <p class="text-center text-sm text-gray-600">
            Already have an account? <a href="/login/"
                class="text-blue-600 hover:text-blue-700 font-semibold transition-colors">Sign in</a>
        </p>
    </div>

    <script>lucide.createIcons();</script>
</body>

</html>
